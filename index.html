<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>
    <script src="jquery-4.0.0.min.js"></script>
</head>
<style>
    body {
        position: relative
    }
    #click {
        color: rgb(161, 255, 124); font-size: 100px; line-height: 100px; padding: 6px; border-radius: 10px; font-family: Georgia, serif; font-weight: normal; text-decoration: none; font-style: normal; font-variant: normal; text-transform: none; background-image: linear-gradient(to right, rgb(28, 110, 164) 0%, rgb(35, 136, 203) 50%, rgb(20, 78, 117) 100%); box-shadow: rgb(0, 0, 0) 5px 5px 15px 5px; border: 2px solid rgb(28, 110, 164); display: inline-block;
    }
    #click:hover {
        background: #1C6EA4; }
    #click:active {
        background: #144E75;
    }
    #number {
        color: #144E75;
        text-shadow: #FFF 0 -1px 4px, #ff0 0 -2px 10px, #ff8000 0 -10px 20px, red 0 -18px 40px;
    }
    .activated {
        background-color: #144E75;
    }
    .helper-container {
        position: absolute;
        top: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
</style>
<body>
    <h3 id="number">0</h3>
    <button id="click">Click</button>
    <div class="helper-container">
        <button id="cursor" class="helper">cursor: 0</button>
        <button id="grandma" class="helper">grandma: 0</button>
    </div>
</body>
<script>
    var multiplier = 1.85;
    var vals = { cursor: 1, grandma: 3 };

    // Default game state
    var gameState = {
        number: 0,
        workers: { cursor: 0, grandma: 0 },
        stats: { cursor: 5, grandma: 10 }
    };

    // Load from localStorage if it exists
    window.onload = function () {
        const saved = localStorage.getItem("gameState");
        if (saved) {
            gameState = JSON.parse(saved);
        }
        updateNumber();
        updateHelpers();
    };

    function saveGameState() {
        localStorage.setItem("gameState", JSON.stringify(gameState));
    }

    function updateNumber() {
        $("#number").html(String(gameState.number));
    }

    function updateHelpers() {
        for (let key in gameState.workers) {
            $(`#${key}`).text(`${key}: ${gameState.workers[key]}`);
        }
    }

    function animateImage(src) {
        const img = document.createElement('img');
        img.src = src;
        img.style.position = 'absolute';
        const maxX = window.innerWidth - 100;
        const maxY = window.innerHeight - 100;
        img.style.left = Math.random() * maxX + 'px';
        img.style.top = Math.random() * maxY + 'px';
        img.style.width = '50px';
        img.style.height = '50px';
        img.style.opacity = 0;
        img.style.transition = 'all 0.5s ease';
        img.style.pointerEvents = 'none';
        document.body.appendChild(img);
        requestAnimationFrame(() => {
            img.style.opacity = 1;
            img.style.width = '150px';
            img.style.height = '150px';
        });
        setTimeout(() => {
            img.style.opacity = 0;
            img.style.width = '50px';
            img.style.height = '50px';
            img.addEventListener('transitionend', () => img.remove(), { once: true });
        }, 2000);
    }

            updateHelpers();
            saveGameState();
