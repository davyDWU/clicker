        right: 0;

        gap: 5px;

/* =========================
   GAME STATE
========================= */

let gameState = {
    number: 0,
    workers: {
        cursor: 0,
        grandma: 0
    },
    stats: {
        cursor: 5,
        grandma: 10
    }
};


/* =========================
   LOAD / SAVE
========================= */

function saveGame() {
    localStorage.setItem("gameState", JSON.stringify(gameState));
}

function loadGame() {
    const saved = localStorage.getItem("gameState");
    if (saved) {
        gameState = JSON.parse(saved);
    }
}


/* =========================
   UI UPDATES
========================= */

function updateNumber() {
    $("#number").text(gameState.number);
}

function updateHelpers() {
    for (let key in gameState.workers) {
        const count = gameState.workers[key];
        const cost = gameState.stats[key];
        $(`#${key}`).text(`${key}: ${count} ($${cost})`);
    }
}

function updateAffordable() {
    for (let key in gameState.stats) {
        if (gameState.number >= gameState.stats[key]) {
            $(`#${key}`).addClass("activated");
        } else {
            $(`#${key}`).removeClass("activated");
        }
    }
}


/* =========================
   IMAGE ANIMATION
========================= */

function animateImage() {
    const img = document.createElement("img");

    // random image
    img.src = imagePool[Math.floor(Math.random() * imagePool.length)];

    img.style.position = "absolute";
    img.style.left = Math.random() * (window.innerWidth - 150) + "px";
    img.style.top = Math.random() * (window.innerHeight - 150) + "px";

    img.style.width = "50px";
    img.style.opacity = "0";
    img.style.transition = "all 0.4s ease";
    img.style.pointerEvents = "none";

    document.body.appendChild(img);

    requestAnimationFrame(() => {
        img.style.opacity = "1";
        img.style.width = "150px";
    });

    setTimeout(() => {
        img.style.opacity = "0";
        img.style.width = "50px";
        img.addEventListener("transitionend", () => img.remove(), { once: true });
    }, 1500);
}


/* =========================
   GAME LOGIC
========================= */

function addClick() {
    gameState.number++;
    updateNumber();
    animateImage();
    saveGame();
}

function buyWorker(id) {
    const cost = gameState.stats[id];

    if (gameState.number >= cost) {
        gameState.number -= cost;
        gameState.workers[id]++;
        gameState.stats[id] = Math.round(cost * multiplier);

        updateNumber();
        updateHelpers();
        saveGame();
    }
}

function runWorkers() {
    for (let key in gameState.workers) {
        const amount = gameState.workers[key] * vals[key];

        if (amount > 0) {
            gameState.number += amount;

            for (let i = 0; i < amount; i++) {
                animateImage();
            }
        }
    }

    updateNumber();
    saveGame();
}


/* =========================
   INIT
========================= */

$(document).ready(function () {

    loadGame();
    updateNumber();
    updateHelpers();

    $("#click").on("click", addClick);

    $(".helper").on("click", function () {
        buyWorker($(this).attr("id"));
    });

    setInterval(runWorkers, 1000);
    setInterval(updateAffordable, 500);

});
</script>
